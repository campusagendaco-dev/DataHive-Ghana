<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 440px; margin: 48px auto; padding: 0 16px; }
      input, button { width: 100%; margin: 8px 0; padding: 10px; box-sizing: border-box; }
      .error { color: #b00020; }
      .ok { color: #0a7a28; }
      .muted { color: #666; font-size: 14px; }
    </style>
  </head>
  <body>
    <h2>Forgot Password</h2>
    <p class="muted">Enter your account email to receive a 6-digit OTP code.</p>
    <form id="forgotForm">
      <input id="email" type="email" placeholder="Email address" required />
      <button type="submit">Send OTP</button>
    </form>
    <p id="message"></p>

    <script>
      const form = document.getElementById("forgotForm");
      const messageEl = document.getElementById("message");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        messageEl.className = "";
        const email = document.getElementById("email").value.trim().toLowerCase();

        try {
          const response = await fetch("/api/forgot-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email }),
          });
          const data = await response.json();

          if (!response.ok) {
            messageEl.className = "error";
            messageEl.textContent = data.message || "Unable to send OTP.";
            return;
          }

          messageEl.className = "ok";
          messageEl.textContent = "OTP sent. Redirecting to verification...";
          window.setTimeout(() => {
            window.location.href = `/verify-otp.html?email=${encodeURIComponent(email)}`;
          }, 900);
        } catch (_error) {
          messageEl.className = "error";
          messageEl.textContent = "Network error. Please try again.";
        }
      });
    </script>
  </body>
</html>
