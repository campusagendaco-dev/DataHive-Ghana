<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 440px; margin: 48px auto; padding: 0 16px; }
      input, button { width: 100%; margin: 8px 0; padding: 10px; box-sizing: border-box; }
      .error { color: #b00020; }
      .ok { color: #0a7a28; }
      .muted { color: #666; font-size: 14px; }
      ul { margin: 8px 0 0 16px; color: #666; }
    </style>
  </head>
  <body>
    <h2>Reset Password</h2>
    <p id="emailText" class="muted"></p>
    <form id="resetForm">
      <input id="newPassword" type="password" placeholder="New Password" minlength="8" required />
      <input id="confirmPassword" type="password" placeholder="Confirm Password" minlength="8" required />
      <button type="submit">Update Password</button>
    </form>
    <ul>
      <li>At least 8 characters</li>
      <li>Uppercase and lowercase letters</li>
      <li>At least one number</li>
      <li>At least one special character</li>
    </ul>
    <p id="message"></p>

    <script>
      const messageEl = document.getElementById("message");
      const emailFromQuery = new URLSearchParams(window.location.search).get("email");
      const emailFromSession = sessionStorage.getItem("resetEmail");
      const email = (emailFromQuery || emailFromSession || "").toLowerCase();
      const resetToken = sessionStorage.getItem("resetToken");
      const emailText = document.getElementById("emailText");

      if (!email || !resetToken) {
        emailText.textContent = "Reset session is missing or expired. Verify OTP again.";
        document.getElementById("resetForm").style.display = "none";
      } else {
        emailText.textContent = `Resetting password for ${email}`;
      }

      const isStrongPassword = (value) =>
        value.length >= 8 &&
        /[A-Z]/.test(value) &&
        /[a-z]/.test(value) &&
        /\d/.test(value) &&
        /[^A-Za-z0-9]/.test(value);

      document.getElementById("resetForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        messageEl.className = "";

        const newPassword = document.getElementById("newPassword").value;
        const confirmPassword = document.getElementById("confirmPassword").value;

        if (newPassword !== confirmPassword) {
          messageEl.className = "error";
          messageEl.textContent = "Passwords do not match.";
          return;
        }

        if (!isStrongPassword(newPassword)) {
          messageEl.className = "error";
          messageEl.textContent =
            "Password must be at least 8 characters and include uppercase, lowercase, number, and special character.";
          return;
        }

        try {
          const response = await fetch("/api/reset-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              email,
              resetToken,
              newPassword,
              confirmPassword,
            }),
          });
          const data = await response.json();

          if (!response.ok) {
            messageEl.className = "error";
            messageEl.textContent = data.message || "Password reset failed.";
            return;
          }

          sessionStorage.removeItem("resetToken");
          sessionStorage.removeItem("resetEmail");

          messageEl.className = "ok";
          messageEl.textContent = "Password updated successfully. Redirecting...";
          window.setTimeout(() => {
            window.location.href = "/login.html";
          }, 1200);
        } catch (_error) {
          messageEl.className = "error";
          messageEl.textContent = "Network error. Please try again.";
        }
      });
    </script>
  </body>
</html>
